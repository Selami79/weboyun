<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- ZEMIN -->
  <rect x="0" y="0" width="1000" height="1000" fill="#003300" />
  <rect x="15" y="15" width="970" height="970" rx="20" fill="none" stroke="#D4AF37" stroke-width="8" />
  <rect x="30" y="30" width="940" height="940" rx="15" fill="none" stroke="#B8860B" stroke-width="2" />

  <!-- ORTA ALAN -->
