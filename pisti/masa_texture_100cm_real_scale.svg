  <rect id="slot-round-1" x="920" y="630" width="40" height="60" rx="20" fill="none" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-total-1" x="920" y="310" width="40" height="60" rx="20" fill="none" stroke="#FF4444" stroke-width="2" />

  <!-- DESTE ALANI -->
  <rect x="730" y="850" width="180" height="110" rx="5" fill="none" stroke="#666666" stroke-width="2" stroke-dasharray="5,5" />
  <text x="820" y="930" font-family="Arial" font-size="24" fill="#666666" text-anchor="middle">DESTE</text>

  <!-- LOGO -->
  <text x="500" y="350" font-family="Georgia" font-weight="bold" font-size="80" fill="#002200" opacity="0.3" text-anchor="middle">PİŞTİ</text>
  <text x="500" y="670" font-family="Georgia" font-weight="bold" font-size="80" fill="#002200" opacity="0.3" text-anchor="middle" transform="rotate(180, 500, 650)">PİŞTİ</text>
