  <rect x="400" y="400" width="200" height="200" rx="10" fill="none" stroke="#4488FF" stroke-width="2" stroke-dasharray="8,8" opacity="0.5" />

  <!-- GÜNEY (ALT) - P0 -->
  <rect id="slot-name-0" x="380" y="920" width="240" height="40" rx="5" fill="#002200" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-round-0" x="310" y="920" width="60" height="40" rx="20" fill="none" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-total-0" x="630" y="920" width="60" height="40" rx="20" fill="none" stroke="#FF4444" stroke-width="2" />

  <!-- KUZEY (ÜST) - P2 -->
  <rect id="slot-name-2" x="380" y="40" width="240" height="40" rx="5" fill="#002200" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-round-2" x="630" y="40" width="60" height="40" rx="20" fill="none" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-total-2" x="310" y="40" width="60" height="40" rx="20" fill="none" stroke="#FF4444" stroke-width="2" />

  <!-- BATI (SOL) - P3 -->
  <rect id="slot-name-3" x="40" y="380" width="40" height="240" rx="5" fill="#002200" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-round-3" x="40" y="310" width="40" height="60" rx="20" fill="none" stroke="#D4AF37" stroke-width="2" />
  <rect id="slot-total-3" x="40" y="630" width="40" height="60" rx="20" fill="none" stroke="#FF4444" stroke-width="2" />

